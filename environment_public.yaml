name: datasets_ml
channels:
  - conda-forge
dependencies:
  - python=3.10
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.13
  - plotly>=5.0
  - ase>=3.22
  - dscribe>=2.0          # SOAP/ACSF descriptors
  - spglib>=2.0           # symmetry analysis
  - mendeleev>=0.14
  - pymatgen>=2023.0
  - joblib>=1.2
  - requests>=2.28
  - tqdm>=4.60
  - ipykernel>=6.0
  - ipywidgets>=8.0
  - jupyter_client>=8.0
  - statsmodels>=0.14
  - flask>=3.0
  - bibtexparser>=1.4
  - monty>=2024.0
  - pybind11>=2.10
  - papermill>=2.4        # notebook execution / testing
  - pip:
    - Cython>=3.0         # required to build python-ace C extensions

    # -----------------------------------------------------------------------
    # Install these manually from the repository after creating the env:
    #
    #   pip install -e Tools/                            # datasetsml-tools
    #   pip install -e dependencies/PyCEF/               # pycef
    #   git submodule update --init dependencies/python-ace
    #   pip install -e dependencies/python-ace/          # python-ace (public)
    #
    # BOPfox-dependent packages (available on request from the authors):
    #   pip install -e dependencies/bopfoxfeaturizer/
    #   pip install -e dependencies/bopdftprojections/
    # -----------------------------------------------------------------------
